<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mapa iMapLite — ORTO/TOPO + numery adresowe</title>
<style>
body { margin:0; font-family: sans-serif; }
#panel {
    position: absolute; top: 10px; left: 60px;
    z-index: 9999; background: white; padding: 10px;
    border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
    width: 280px;
}
#panel input[type="text"] { width: 100%; box-sizing: border-box; margin-bottom: 5px; padding: 4px; }
#panel button { width: 100%; padding: 4px; cursor: pointer; }
#panel hr { margin: 10px 0; border: none; border-top: 1px solid #ddd; }
#suggestions {
    background: white; border: 1px solid #ccc;
    max-height: 220px; overflow-y: auto;
    display: none; margin-top: -5px; margin-bottom: 5px;
}
#suggestions div {
    padding: 5px 8px; cursor: pointer;
    border-bottom: 1px solid #eee; font-size: 13px;
}
#suggestions div:hover { background: #f0f6ff; }
#suggestions .empty { color: #777; cursor: default; }
#suggestions .err   { color: #900; cursor: default; }
#info { font-size: 12px; color: #555; margin-top: 5px; }
.basemap-row { display:flex; gap:6px; margin-bottom:6px; }
.basemap-row label {
    flex:1; text-align:center; font-size:12px;
    padding:6px 0; border:1px solid #ccc; border-radius:4px;
    cursor:pointer; background:#fafafa;
}
.basemap-row input { display:none; }
.basemap-row label:has(input:checked) {
    background:#1976d2; border-color:#1976d2; color:white;
}
</style>
<script>
(function(){
    var s = document.createElement('script');
    var host = 'mapy' + '.geoportal.gov.pl';
    s.src = 'https://' + host + '/iMapLite/api/cdn/2.0.0/imgp-map/imap-lite-api.js';
    document.head.appendChild(s);
})();
</script>
</head>
<body>

<div id="panel">
    <b>Podklad</b>
    <div class="basemap-row">
        <label><input type="radio" name="bm" value="G2:ORTO" checked><span>ORTO</span></label>
        <label><input type="radio" name="bm" value="G2:TOPO"><span>TOPO</span></label>
    </div>

    <hr>
    <b>Szukaj adresu</b>
    <input id="address" type="text" placeholder="np. Poznan Ratajczaka 39" autocomplete="off">
    <div id="suggestions"></div>

    <hr>
    <b>Wspolrzedne</b>
    <input id="lat" type="text" placeholder="Lat">
    <input id="lng" type="text" placeholder="Lng">
    <button onclick="ustawMarker()">Pokaz na mapie</button>
    <div id="info">Klik na mape = wspolrzedne tutaj. Numery widoczne od zoom ~15.</div>
</div>

<imgp-map
    id="mapa"
    style="width:100%; height:100vh;"
    zoom="10"
    center="[52.4, 16.9]"
    epsg="2180:G2"
    basemap="G2:ORTO">
</imgp-map>

<script>
document.addEventListener("WebComponentsReady", function() {
    var imap = document.getElementById("mapa");
    var map = imap.map;
    var marker = null;
    var crs2180 = map.options.crs;

    // PRZELACZNIK PODKLADU
    document.querySelectorAll('input[name="bm"]').forEach(function(rb){
        rb.addEventListener('change', function(){
            if (!this.checked) return;
            try { imap.setAttribute('basemap', this.value); }
            catch(e) { console.warn("Basemap switch failed", e); }
        });
    });

    // === URL-e usług ===
    var KIEG_URL  = 'https://integracja.gugik.gov.pl/cgi-bin/KrajowaIntegracjaEwidencjiGruntow';
    var KINA_URL  = 'https://mapy.geoportal.gov.pl/wss/ext/KrajowaIntegracjaNumeracjiAdresowej';
    var PRG_BOUND = 'https://mapy.geoportal.gov.pl/wss/service/PZGIK/PRG/WMS/AdministrativeBoundaries';

    // === WARSTWY ===
    var dzialki = L.tileLayer.wms(KIEG_URL,
        { layers:'dzialki,numery_dzialek', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180, attribution:'GUGiK - KIEG',
          opacity:0.9, keepBuffer:8, crossOrigin:true });

    var budynki = L.tileLayer.wms(KIEG_URL,
        { layers:'budynki', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180, attribution:'GUGiK - KIEG',
          opacity:0.85, keepBuffer:8, crossOrigin:true });

    // ⭐ NUMERY ADRESOWE — KINA (publiczna usluga GUGiK)
    var numeryAdresowe = L.tileLayer.wms(KINA_URL,
        { layers:'prg-adresy', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180,
          attribution:'GUGiK - Krajowa Integracja Numeracji Adresowej',
          opacity:1.0, keepBuffer:8, crossOrigin:true });

    var ulice = L.tileLayer.wms(KINA_URL,
        { layers:'prg-ulice', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180,
          attribution:'GUGiK - KINA (ulice)',
          opacity:0.9, keepBuffer:8, crossOrigin:true });

    var graniceGmin = L.tileLayer.wms(PRG_BOUND,
        { layers:'A03_Granice_gmin', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180, attribution:'Geoportal - PRG',
          opacity:0.7, keepBuffer:4, crossOrigin:true });

    var granicePowiatow = L.tileLayer.wms(PRG_BOUND,
        { layers:'A02_Granice_powiatow', format:'image/png', transparent:true,
          version:'1.1.1', crs:crs2180, attribution:'Geoportal - PRG',
          opacity:0.7, keepBuffer:4, crossOrigin:true });

    L.control.layers(
        {},
        {
            "Dzialki + numery": dzialki,
            "Budynki (obrysy)": budynki,
            "Numery adresowe": numeryAdresowe,
            "Ulice (z nazwami)": ulice,
            "Granice gmin": graniceGmin,
            "Granice powiatow": granicePowiatow
        },
        { collapsed: false }
    ).addTo(map);

    dzialki.addTo(map);
    budynki.addTo(map);
    numeryAdresowe.addTo(map);  // wlaczone domyslnie

    // MARKER + FORMULARZ
    function ustawMarkerNaMapie(lat, lng, popupTekst) {
        lat = parseFloat(lat); lng = parseFloat(lng);
        if (isNaN(lat) || isNaN(lng)) { alert("Niepoprawne wspolrzedne!"); return; }
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup(
            popupTekst || ("Lat: " + lat.toFixed(6) + "<br>Lng: " + lng.toFixed(6))
        ).openPopup();
        map.setView([lat, lng], 17);
    }

    map.on('click', function(e) {
        document.getElementById("lat").value = e.latlng.lat.toFixed(6);
        document.getElementById("lng").value = e.latlng.lng.toFixed(6);
        ustawMarkerNaMapie(e.latlng.lat, e.latlng.lng);
    });

    window.ustawMarker = function() {
        ustawMarkerNaMapie(
            document.getElementById("lat").value,
            document.getElementById("lng").value
        );
    };

    // SZUKAJKA
    var addressInput = document.getElementById("address");
    var suggestionsBox = document.getElementById("suggestions");
    var debounceTimer = null;

    addressInput.addEventListener("input", function() {
        var query = addressInput.value.trim();
        clearTimeout(debounceTimer);
        if (query.length < 3) { suggestionsBox.style.display = "none"; return; }
        debounceTimer = setTimeout(function() { szukajAdresu(query); }, 400);
    });

    function szukajAdresu(query) {
        var url = 'https://nominatim.openstreetmap.org/search'
                + '?format=json&countrycodes=pl&addressdetails=1&limit=10'
                + '&q=' + encodeURIComponent(query);
        fetch(url, { headers: { 'Accept-Language': 'pl' } })
            .then(function(r) { return r.json(); })
            .then(function(data) { pokazPodpowiedzi(data); })
            .catch(function(err) {
                console.error(err);
                suggestionsBox.innerHTML = '<div class="err">Blad wyszukiwania</div>';
                suggestionsBox.style.display = "block";
            });
    }

    function pokazPodpowiedzi(results) {
        suggestionsBox.innerHTML = "";
        if (!results || results.length === 0) {
            suggestionsBox.innerHTML = '<div class="empty">Brak wynikow</div>';
            suggestionsBox.style.display = "block";
            return;
        }
        results.forEach(function(item) {
            var div = document.createElement("div");
            div.textContent = item.display_name;
            div.title = item.display_name;
            div.onclick = function() { wybierzAdres(item); };
            suggestionsBox.appendChild(div);
        });
        suggestionsBox.style.display = "block";
    }

    function wybierzAdres(item) {
        var lat = parseFloat(item.lat);
        var lng = parseFloat(item.lon);
        if (isNaN(lat) || isNaN(lng)) { alert("Brak wspolrzednych"); return; }
        var krotki = item.display_name.split(",").slice(0, 3).join(", ");
        var popis = "<b>" + krotki + "</b><br>"
                  + "<small>" + lat.toFixed(6) + ", " + lng.toFixed(6) + "</small>";
        document.getElementById("lat").value = lat.toFixed(6);
        document.getElementById("lng").value = lng.toFixed(6);
        ustawMarkerNaMapie(lat, lng, popis);
        suggestionsBox.style.display = "none";
        addressInput.value = krotki;
    }

    document.addEventListener("click", function(e) {
        if (!suggestionsBox.contains(e.target) && e.target !== addressInput) {
            suggestionsBox.style.display = "none";
        }
    });

    console.log("iMapLite + KINA numery adresowe ready", map);
});
</script>
</body>
</html>
