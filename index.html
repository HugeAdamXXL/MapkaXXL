<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mapa Geoportal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; }
        #map { height:100vh; background:#eee; }
        #panel {
            position: absolute; top: 10px; left: 60px;
            z-index: 1000; background: white; padding: 10px;
            border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #panel input { width: 140px; margin-bottom: 5px; }
        #panel button { width: 100%; }
    </style>
</head>
<body>

<div id="panel">
    <b>Wprowadź współrzędne</b><br>
    <input id="lat" type="text" placeholder="Lat">
    <input id="lng" type="text" placeholder="Lng">
    <button onclick="ustawMarker()">Pokaż</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([52.4, 16.9], 13);

    // =========================
    // OSM (bazowa)
    // =========================
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19
    }).addTo(map);

    // =========================
    // ORTOFOTOMAPA — WMTS Geoportal ✅
    // =========================
    var orto = L.tileLayer(
        'https://mapy.geoportal.gov.pl/wss/service/WMTS/guest/wmts/ORTO?' +
        'SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0' +
        '&LAYER=ORTOFOTOMAPA&TILEMATRIXSET=EPSG:3857' +
        '&TILEMATRIX=EPSG:3857:{z}&TILECOL={x}&TILEROW={y}' +
        '&FORMAT=image/jpeg',
        {
            attribution: 'Geoportal.gov.pl',
            maxZoom: 20
        }
    );

    // =========================
    // DZIAŁKI EWIDENCYJNE — WMTS ✅
    // =========================
    var dzialki = L.tileLayer(
        'https://mapy.geoportal.gov.pl/wss/service/WMTS/guest/wmts/G2_DZIALKI?' +
        'SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0' +
        '&LAYER=G2_DZIALKI_WMTS&TILEMATRIXSET=EPSG:3857' +
        '&TILEMATRIX=EPSG:3857:{z}&TILECOL={x}&TILEROW={y}' +
        '&FORMAT=image/png',
        {
            attribution: 'Geoportal.gov.pl',
            maxZoom: 20,
            opacity: 0.8
        }
    );

    // =========================
    // BUDYNKI — WMTS ✅
    // =========================
    var budynki = L.tileLayer(
        'https://mapy.geoportal.gov.pl/wss/service/WMTS/guest/wmts/BDOT10k?' +
        'SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0' +
        '&LAYER=BDOT10k&TILEMATRIXSET=EPSG:3857' +
        '&TILEMATRIX=EPSG:3857:{z}&TILECOL={x}&TILEROW={y}' +
        '&FORMAT=image/png',
        {
            attribution: 'Geoportal.gov.pl',
            maxZoom: 20,
            opacity: 0.7
        }
    );

    L.control.layers(
        {
            "OSM": osm,
            "Orto (Geoportal)": orto
        },
        {
            "Działki": dzialki,
            "Budynki (BDOT10k)": budynki
        }
    ).addTo(map);

    // =========================
    // MARKER
    // =========================
    var marker;
    function ustawMarkerNaMapie(lat, lng) {
        lat = parseFloat(lat); lng = parseFloat(lng);
        if (isNaN(lat) || isNaN(lng)) { alert("Niepoprawne współrzędne!"); return; }
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup("Lat: "+lat.toFixed(6)+"<br>Lng: "+lng.toFixed(6)).openPopup();
        map.setView([lat, lng], 18);
    }
    map.on('click', function(e) {
        document.getElementById("lat").value = e.latlng.lat.toFixed(6);
        document.getElementById("lng").value = e.latlng.lng.toFixed(6);
        ustawMarkerNaMapie(e.latlng.lat, e.latlng.lng);
    });
    function ustawMarker() {
        ustawMarkerNaMapie(
            document.getElementById("lat").value,
            document.getElementById("lng").value
        );
    }
</script>
</body>
</html>
